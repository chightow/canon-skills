name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Tests spin up throwaway git repos in temp dirs.
      - name: Configure git identity
        run: |
          git config --global user.email ci@canon.test
          git config --global user.name "canon CI"

      - name: Run test suite
        run: npm test
